name: Supabase Keep-Alive

# Runs twice a week (Monday and Thursday at 08:00 UTC) to prevent
# Supabase from pausing the free-tier project after 7 days of inactivity.
on:
  schedule:
    - cron: '0 8 * * 1'   # Monday    08:00 UTC
    - cron: '0 8 * * 4'   # Thursday  08:00 UTC
  workflow_dispatch:       # Allow manual trigger from the Actions tab

jobs:
  ping:
    name: Tickle Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase REST API
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --request GET \
            "${{ secrets.SUPABASE_URL }}/rest/v1/?limit=1" \
            --header "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Response status: $STATUS"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Unexpected status code: $STATUS"
            exit 1
          fi

          echo "Supabase is alive!"
